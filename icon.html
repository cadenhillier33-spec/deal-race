<!DOCTYPE html>
<html>
<head>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { width: 512px; height: 512px; overflow: hidden; }
.icon {
  width: 512px;
  height: 512px;
  background: linear-gradient(135deg, #0B1120 0%, #000000 100%);
  display: flex;
  align-items: center;
  justify-content: center;
  flex-direction: column;
  position: relative;
  border-radius: 100px;
  overflow: hidden;
}
.icon::before {
  content: '';
  position: absolute;
  top: -50px;
  right: -50px;
  width: 250px;
  height: 250px;
  background: radial-gradient(circle, rgba(59,130,246,0.15) 0%, transparent 70%);
  border-radius: 50%;
}
.trophy {
  font-size: 140px;
  margin-bottom: 10px;
  position: relative;
  z-index: 1;
}
.text {
  font-family: 'Inter', -apple-system, sans-serif;
  font-size: 52px;
  font-weight: 900;
  color: #ffffff;
  letter-spacing: -2px;
  position: relative;
  z-index: 1;
}
.text span { color: #D4A853; }
.bottom-line {
  position: absolute;
  bottom: 0;
  left: 0;
  right: 0;
  height: 6px;
  background: linear-gradient(90deg, #D4A853, #3b82f6);
}
</style>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@900&display=swap" rel="stylesheet">
</head>
<body>
<div class="icon">
  <div class="trophy">🏆</div>
  <div class="text">DEAL <span>RACE</span></div>
  <div class="bottom-line"></div>
</div>
</body>
</html>
